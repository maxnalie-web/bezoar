name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Prebuild Android native project
        run: npx expo prebuild --platform android --non-interactive
        working-directory: client

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/**/*.gradle*') }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        working-directory: client

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: client/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bezoar-android-${{ github.run_number }}
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Publish sideloadable APK release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="client/android/app/build/outputs/apk/debug/app-debug.apk"
          gh release delete latest-apk --yes 2>/dev/null || true
          gh release create latest-apk "$APK_PATH" \
            --title "Bezoar (latest Android build)" \
            --notes "Auto-built from the latest main branch. Download bezoar.apk and install directly on Android (enable Install from unknown sources)." \
            --prerelease
