# trigger build
name: Build Android APK (EAS Cloud)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build APK via EAS Cloud
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait
        working-directory: client
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download built APK
        run: |
          eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive \
            | python3 -c "
import sys, json, urllib.request
builds = json.load(sys.stdin)
if builds:
    url = builds[0].get('artifacts', {}).get('buildUrl', '')
    if url:
        urllib.request.urlretrieve(url, 'bezoar.apk')
        print('Downloaded:', url[:80])
    else:
        print('No buildUrl found')
        print(json.dumps(builds[0], indent=2))
"
        working-directory: client
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bezoar-apk-${{ github.run_number }}
          path: client/bezoar.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish sideloadable APK release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-apk --yes 2>/dev/null || true
          gh release create latest-apk client/bezoar.apk \
            --title "Bezoar (latest Android build)" \
            --notes "Auto-built via EAS. Download bezoar.apk and install directly on Android." \
            --prerelease
