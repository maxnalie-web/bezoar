name: Build Bezoar APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build APK via EAS Cloud
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download built APK
        run: |
          eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive \
            | python3 -c "
import sys, json, urllib.request
builds = json.load(sys.stdin)
if builds:
    url = builds[0].get('artifacts', {}).get('buildUrl', '')
    if url:
        urllib.request.urlretrieve(url, 'bezoar.apk')
        print('Downloaded APK')
    else:
        print('No buildUrl:', json.dumps(builds[0].get('artifacts'), indent=2))
else:
    print('No builds found')
"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: bezoar-apk-${{ github.run_number }}
          path: bezoar.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-apk --yes 2>/dev/null || true
          gh release create latest-apk bezoar.apk \
            --title "Bezoar (latest Android build)" \
            --notes "Built via EAS Cloud. Download bezoar.apk and install directly on Android." \
            --prerelease
