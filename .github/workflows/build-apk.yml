name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install
        working-directory: client

      - name: Build APK (preview)
        run: eas build --platform android --profile preview --non-interactive --local --output ../bezoar-release.apk
        working-directory: client

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bezoar-apk
          path: bezoar-release.apk
          retention-days: 30

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Bezoar APK - Build ${{ github.run_number }}"
          files: bezoar-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
